name: iOS Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  xcode-archive:
    name: Xcode archive smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Regenerate iOS project files
        run: ./scripts/bootstrap-ios-project.sh

      - name: Archive unsigned iOS app
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/ios/ComfyMobileClient.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package archive artifact
        run: |
          set -euo pipefail
          mkdir -p build/ios-artifacts
          ditto -c -k --keepParent build/ios/ComfyMobileClient.xcarchive build/ios-artifacts/ComfyMobileClient.xcarchive.zip

      - name: Upload unsigned archive
        uses: actions/upload-artifact@v4
        with:
          name: comfymobileclient-ios-xcarchive
          path: build/ios-artifacts/ComfyMobileClient.xcarchive.zip
          if-no-files-found: error
          retention-days: 30
