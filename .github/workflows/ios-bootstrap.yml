name: iOS Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-ios-project:
    name: Generate iOS shell project
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate iosApp project files
        run: ./scripts/bootstrap-ios-project.sh

      - name: Verify shared iOS targets compile
        run: ./gradlew :shared:compileKotlinIosArm64 :shared:compileKotlinIosSimulatorArm64 --stacktrace

      - name: Open PR with generated files when they changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: generate iOS shell project"
          title: "[bot] Generate iOS shell project"
          body: |
            Generated the iOS shell project from `scripts/bootstrap-ios-project.sh`.

            This workflow is intentionally manual so the checked-in Xcode project can be refreshed from a macOS runner without requiring a local Mac.
          branch: bot/ios-bootstrap
          delete-branch: true
